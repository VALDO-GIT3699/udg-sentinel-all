name: CI — UDG Sentinel

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════════
  # JOB 1: Análisis estático y estilo de código PHP
  # ════════════════════════════════════════════════════════
  php-code-quality:
    name: 🔍 Calidad de código PHP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_pgsql, bcmath, intl, redis
          coverage: none

      - name: Cachear dependencias Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Instalar dependencias PHP
        working-directory: backend
        run: composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader

      - name: Laravel Pint (estilo de código)
        working-directory: backend
        run: ./vendor/bin/pint --test

      - name: PHPStan (análisis estático nivel 8)
        working-directory: backend
        run: ./vendor/bin/phpstan analyse --level=8 --memory-limit=512M --no-progress

  # ════════════════════════════════════════════════════════
  # JOB 2: Pruebas PHP con PostgreSQL y Redis
  # ════════════════════════════════════════════════════════
  php-tests:
    name: 🧪 Pruebas PHP (PostgreSQL + Redis)
    runs-on: ubuntu-latest
    needs: php-code-quality

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: udg_sentinel_test
          POSTGRES_USER: sentinel_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_pgsql, bcmath, intl, redis
          coverage: xdebug

      - name: Cachear dependencias Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Instalar dependencias PHP
        working-directory: backend
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Preparar .env para testing
        working-directory: backend
        run: |
          cp .env.example .env.testing
          echo "APP_ENV=testing" >> .env.testing
          echo "APP_KEY=base64:$(openssl rand -base64 32)" >> .env.testing
          echo "DB_CONNECTION=pgsql" >> .env.testing
          echo "DB_HOST=127.0.0.1" >> .env.testing
          echo "DB_PORT=5432" >> .env.testing
          echo "DB_DATABASE=udg_sentinel_test" >> .env.testing
          echo "DB_USERNAME=sentinel_user" >> .env.testing
          echo "DB_PASSWORD=test_password" >> .env.testing
          echo "CACHE_STORE=redis" >> .env.testing
          echo "QUEUE_CONNECTION=sync" >> .env.testing
          echo "SESSION_DRIVER=array" >> .env.testing

      - name: Generar APP_KEY
        working-directory: backend
        run: php artisan key:generate --env=testing

      - name: Ejecutar migraciones de test
        working-directory: backend
        run: php artisan migrate --env=testing --force

      - name: Ejecutar pruebas con cobertura
        working-directory: backend
        run: php artisan test --parallel --coverage --min=70

  # ════════════════════════════════════════════════════════
  # JOB 3: Frontend TypeScript y build de assets
  # ════════════════════════════════════════════════════════
  frontend-checks:
    name: 🎨 Frontend TypeScript + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias npm
        working-directory: backend
        run: npm ci

      - name: TypeScript check
        working-directory: backend
        run: npm run type-check

      - name: ESLint
        working-directory: backend
        run: npm run lint

      - name: Build de producción
        working-directory: backend
        run: npm run build

  # ════════════════════════════════════════════════════════
  # JOB 4: Auditoría de seguridad de dependencias
  # ════════════════════════════════════════════════════════
  security-audit:
    name: 🔒 Auditoría de seguridad
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Instalar Composer (solo sin scripts)
        working-directory: backend
        run: composer install --no-interaction --no-scripts --no-plugins --prefer-dist

      - name: Auditoría de seguridad PHP (Composer)
        working-directory: backend
        run: composer audit

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias npm
        working-directory: backend
        run: npm ci --ignore-scripts

      - name: Auditoría de seguridad npm
        working-directory: backend
        run: npm audit --audit-level=high
