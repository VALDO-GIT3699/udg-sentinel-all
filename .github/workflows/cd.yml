name: CD — Build y Deploy UDG Sentinel

on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ════════════════════════════════════════════════════════
  # JOB 1: Build y Push de imagen Docker
  # ════════════════════════════════════════════════════════
  build-and-push:
    name: 🐳 Build imagen Docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadatos para la imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Configurar Node.js 22 para build de assets
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias npm y compilar assets
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Build y Push imagen Docker
        id: build
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: infrastructure/docker/php/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ════════════════════════════════════════════════════════
  # JOB 2: Deploy a producción (udgsentinel.udg.mx)
  # Solo en push a main o tags de versión
  # ════════════════════════════════════════════════════════
  deploy-production:
    name: 🚀 Deploy a udgsentinel.udg.mx
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Deploy vía SSH al servidor institucional
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script: |
            set -e
            cd /opt/sentinel

            echo "🔄 Actualizando imagen..."
            docker compose -f infrastructure/docker/docker-compose.prod.yml pull

            echo "🚀 Aplicando migraciones..."
            docker compose -f infrastructure/docker/docker-compose.prod.yml run --rm app php artisan migrate --force --no-interaction

            echo "♻️ Reiniciando servicios..."
            docker compose -f infrastructure/docker/docker-compose.prod.yml up -d --no-deps app horizon scheduler

            echo "🔁 Recargando Horizon..."
            docker compose -f infrastructure/docker/docker-compose.prod.yml exec -T horizon php artisan horizon:terminate

            echo "🧹 Limpiando caché de configuración..."
            docker compose -f infrastructure/docker/docker-compose.prod.yml exec -T app php artisan config:cache
            docker compose -f infrastructure/docker/docker-compose.prod.yml exec -T app php artisan route:cache
            docker compose -f infrastructure/docker/docker-compose.prod.yml exec -T app php artisan view:cache
            docker compose -f infrastructure/docker/docker-compose.prod.yml exec -T app php artisan event:cache

            echo "✅ Deploy completado — $(date)"

      - name: Verificar que el sitio responde
        run: |
          sleep 10
          curl -fsSL --max-time 30 https://udgsentinel.udg.mx/api/health \
            -H "Accept: application/json" | jq .
