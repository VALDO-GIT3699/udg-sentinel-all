# ============================================================
# UDG Sentinel — Docker Compose (Desarrollo local)
# ============================================================
# Uso: docker compose -f infrastructure/docker/docker-compose.yml up -d
# ============================================================

services:

  # ──────────────────────────────────────────────
  # PHP-FPM + Laravel App
  # ──────────────────────────────────────────────
  app:
    build:
      context: ../../
      dockerfile: infrastructure/docker/php/Dockerfile
    container_name: sentinel_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ../../backend:/var/www/html
      - ./php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sentinel_network
    healthcheck:
      test: ["CMD", "php", "-r", "echo 'OK';"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────
  # Nginx — Servidor web
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: sentinel_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../../backend:/var/www/html:ro
      - ../nginx/sentinel.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - sentinel_network

  # ──────────────────────────────────────────────
  # PostgreSQL 16 — Base de datos principal
  # ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: sentinel_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: udg_sentinel
      POSTGRES_USER: sentinel_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sentinel_dev_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=es_MX.utf8"
    ports:
      - "5432:5432"
    volumes:
      - sentinel_db_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - sentinel_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel_user -d udg_sentinel"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────────
  # Redis 7 — Cache, Colas y Sesiones
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sentinel_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-sentinel_redis_dev}
    ports:
      - "6379:6379"
    volumes:
      - sentinel_redis_data:/data
    networks:
      - sentinel_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────
  # Laravel Horizon — Monitor de colas
  # ──────────────────────────────────────────────
  horizon:
    build:
      context: ../../
      dockerfile: infrastructure/docker/php/Dockerfile
    container_name: sentinel_horizon
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan horizon
    volumes:
      - ../../backend:/var/www/html
    depends_on:
      - app
      - redis
      - db
    networks:
      - sentinel_network

  # ──────────────────────────────────────────────
  # Laravel Scheduler — Cron de jobs programados
  # ──────────────────────────────────────────────
  scheduler:
    build:
      context: ../../
      dockerfile: infrastructure/docker/php/Dockerfile
    container_name: sentinel_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    # Ejecuta el scheduler cada minuto (simula cron)
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction;
        sleep 60;
      done"
    volumes:
      - ../../backend:/var/www/html
    depends_on:
      - app
      - redis
      - db
    networks:
      - sentinel_network

  # ──────────────────────────────────────────────
  # Mailpit — Captura de emails en desarrollo
  # ──────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: sentinel_mail
    restart: unless-stopped
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    networks:
      - sentinel_network

# ──────────────────────────────────────────────
# Volúmenes persistentes
# ──────────────────────────────────────────────
volumes:
  sentinel_db_data:
    name: sentinel_db_data
  sentinel_redis_data:
    name: sentinel_redis_data

# ──────────────────────────────────────────────
# Red interna
# ──────────────────────────────────────────────
networks:
  sentinel_network:
    name: sentinel_network
    driver: bridge
