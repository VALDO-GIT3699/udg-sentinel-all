# ============================================================
# Nginx — Configuración de PRODUCCIÓN
# Dominio: udgsentinel.udg.mx
# ============================================================

# Redirigir HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name udgsentinel.udg.mx;

    # Para renovación de certificados Let's Encrypt (si aplica)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Todo lo demás redirige a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Servidor HTTPS principal
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name udgsentinel.udg.mx;

    root /var/www/html/public;
    index index.php;
    charset utf-8;
    client_max_body_size 16M;

    # ── Certificado TLS ────────────────────────────────────
    # Opción A: Certificado institucional UDG
    ssl_certificate     /etc/ssl/sentinel/fullchain.pem;
    ssl_certificate_key /etc/ssl/sentinel/privkey.pem;

    # ── Configuración TLS endurecida ───────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Headers de seguridad ───────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # Content-Security-Policy (ajustar según los dominios que se usen)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'nonce-$request_id'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https://fonts.bunny.net; connect-src 'self' wss://udgsentinel.udg.mx; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ── Logs ──────────────────────────────────────────────
    access_log /var/log/nginx/sentinel_access.log;
    error_log  /var/log/nginx/sentinel_error.log warn;

    # ── Límite de tasa (Rate Limiting) ────────────────────
    limit_req_zone $binary_remote_addr zone=sentinel_global:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=sentinel_login:10m rate=5r/m;

    limit_req zone=sentinel_global burst=50 nodelay;

    # ── Rutas ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Login con rate limiting estricto
    location ~ ^/(login|api/auth) {
        limit_req zone=sentinel_login burst=3 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ───────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param SERVER_NAME $server_name;
        fastcgi_param HTTPS on;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 60;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    # ── Assets estáticos (máximo cache) ───────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(css|js|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Bloqueos de seguridad ──────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|log|bak|sql|sh|yml|yaml|json|lock)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Bloquear acceso directo a archivos PHP internos
    location ~* ^/(artisan|server\.php|phpinfo\.php) {
        deny all;
    }
}
